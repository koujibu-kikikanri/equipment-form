<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>備品管理</title>

<style>
body {
  font-size: 22px;
  font-family: sans-serif;
  padding: 15px;
}

h2 {
  font-size: 26px;
}

/* 入力欄 */
input, select, textarea {
  font-size: 22px;
  padding: 12px;
  width: 100%;
  margin-top: 5px;
  margin-bottom: 15px;
  border: 3px solid #000;
  border-radius: 8px;
}

/* ボタン */
button {
  font-size: 24px;
  padding: 15px;
  width: 100%;
  background-color: #0078D4;
  color: white;
  border: none;
  border-radius: 10px;
}

button:active {
  background-color: #005a9e;
}

label {
  font-weight: bold;
}

</style>

</head>

<body>

<h2>備品管理フォーム</h2>

<form id="form">

<input type="hidden" id="item">

<label>区分</label>
<select id="mode">
  <option value="">選択してください</option>
  <option value="持出">持出</option>
  <option value="返却">返却</option>
</select>

<!-- ✅ 持出用 -->
<div id="carryFields" style="display:none;">

  <label>現場名（持出）</label>
  <input type="text" id="siteCarry">

  <label>担当者（持出）</label>
  <input type="text" id="userCarry">

  <label>持出日</label>
  <input type="date" id="carryDate">

  <label>返却予定日</label>
  <input type="date" id="returnPlan">

</div>

<!-- ✅ 返却用 -->
<div id="returnFields" style="display:none;">

  <label>現場名（返却）</label>
  <input type="text" id="siteReturn">

  <label>担当者（返却）</label>
  <input type="text" id="userReturn">

  <label>返却日</label>
  <input type="date" id="returnDate">

  <label>不具合有無</label>
  <select id="issueFlag">
    <option value="なし">なし</option>
    <option value="あり">あり</option>
  </select>

  <div id="issueDetailArea" style="display:none;">
    <label>不具合詳細</label>
    <textarea id="issueDetail"></textarea>
  </div>

</div>

<button type="submit">送信</button>

</form>

<script>

// ✅ QRから備品ID取得
const params = new URLSearchParams(window.location.search);
const item = params.get("item");
document.getElementById("item").value = item;

// ✅ 表示切替
document.getElementById("mode").addEventListener("change", function(){
  const mode = this.value;

  document.getElementById("carryFields").style.display =
    (mode === "持出") ? "block" : "none";

  document.getElementById("returnFields").style.display =
    (mode === "返却") ? "block" : "none";
});

// ✅ 不具合詳細表示
document.getElementById("issueFlag").addEventListener("change", function(){
  document.getElementById("issueDetailArea").style.display =
    (this.value === "あり") ? "block" : "none";
});

// ✅ 送信
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const data = {
    item: item,
    mode: document.getElementById("mode").value,

    // 持出
    siteCarry: document.getElementById("siteCarry").value,
    userCarry: document.getElementById("userCarry").value,
    carryDate: document.getElementById("carryDate").value,
    returnPlan: document.getElementById("returnPlan").value,

    // 返却
    siteReturn: document.getElementById("siteReturn").value,
    userReturn: document.getElementById("userReturn").value,
    returnDate: document.getElementById("returnDate").value,
    issueFlag: document.getElementById("issueFlag").value,
    issueDetail: document.getElementById("issueDetail").value
  };

  fetch("ここにPowerAutomateのURL", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  alert("送信しました");
});

</script>

</body>
</html>
