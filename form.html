<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>備品管理</title>

<style>
body {
  font-size: 20px;            /* ✅ 全体文字を大きく */
  font-family: sans-serif;
  padding: 15px;
}

h2 {
  font-size: 26px;
}

/* ✅ 入力欄を大きく */
input, select, textarea {
  font-size: 20px;
  padding: 10px;
  width: 80%;
  margin-top: 5px;
  margin-bottom: 15px;

  /* ✅ 枠を太く＆濃く */
  border: 2px solid #000;
  border-radius: 8px;
}

/* ✅ ボタンを大きく */
button {
  font-size: 22px;
  padding: 12px;
  width: 80%;
  background-color: #0078D4;
  color: white;
  border: none;
  border-radius: 8px;
}

button:active {
  background-color: #005a9e;
}

/* ✅ ラベルを見やすく */
label {
  font-weight: bold;
}

</style>

</head>

<body>

<h2>備品管理フォーム</h2>

<form id="form">

<input type="hidden" id="item">

<label>区分</label>
<select id="mode">
  <option value="">選択してください</option>
  <option value="持出">持出</option>
  <option value="返却">返却</option>
</select>

<label>現場名（例：R0大町）</label>
<input type="text" id="site">

<label>担当者名（例：北陽太郎）</label>
<input type="text" id="user">

<div id="carryFields" style="display:none;">
  <label>持出日</label>
  <input type="date" id="carryDate">

  <label>返却予定日</label>
  <input type="date" id="returnPlan">
</div>

<div id="returnFields" style="display:none;">
  <label>返却日</label>
  <input type="date" id="returnDate">

  <label>故障・不具合の有無</label>
  <select id="issueFlag">
    <option value="なし">なし</option>
    <option value="あり">あり</option>
  </select>

  <div id="issueDetailArea" style="display:none;">
    <label>故障・不具合の詳細な内容</label>
    <textarea id="issueDetail"></textarea>
  </div>
</div>

<button type="submit">送信</button>

</form>

<script>

const params = new URLSearchParams(window.location.search);
const item = params.get("item");
document.getElementById("item").value = item;

document.getElementById("mode").addEventListener("change", function(){
  const mode = this.value;
  document.getElementById("carryFields").style.display = (mode === "持出") ? "block" : "none";
  document.getElementById("returnFields").style.display = (mode === "返却") ? "block" : "none";
});

document.getElementById("issueFlag").addEventListener("change", function(){
  document.getElementById("issueDetailArea").style.display =
    (this.value === "あり") ? "block" : "none";
});

document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  const data = {
    item: item,
    mode: document.getElementById("mode").value,
    site: document.getElementById("site").value,
    user: document.getElementById("user").value,
    carryDate: document.getElementById("carryDate").value,
    returnPlan: document.getElementById("returnPlan").value,
    returnDate: document.getElementById("returnDate").value,
    issueFlag: document.getElementById("issueFlag").value,
    issueDetail: document.getElementById("issueDetail").value
  };

  fetch("ここにPowerAutomateのURL", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  alert("送信しました");
});

</script>

</body>
</html>
