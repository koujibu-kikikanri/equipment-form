<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>備品管理</title>

<style>
* {
  box-sizing: border-box;
}

body {
  font-size: 22px;
  font-family: sans-serif;
  padding: 15px;
}

h2 {
  font-size: 26px;
}

input, select, textarea {
  font-size: 22px;
  padding: 10px;
  width: 100%;
  margin-top: 5px;
  margin-bottom: 15px;
  border: 3px solid #000;
  border-radius: 8px;
}

/* 日付入力をスマホで崩れないように修正 */
input[type="date"] {
  width: 100%;
  max-width: 100%;
  box-sizing: border-box;
  
  /* ← これが効く！ */
  -webkit-appearance: none;
  appearance: none;
}

/* ついでにおすすめ */
body {
  margin: 0;   /* 余白ズレ防止 */
}

button {
  font-size: 28px;
  padding: 22px;
  width: 100%;

  background-color: #0078D4;
  color: white;

  border: none;
  border-radius: 12px;

  margin-top: 25px;

  /* 影をつける */
  box-shadow: 0 4px 6px rgba(0,0,0,0.2);
}


#itemDisplay {
  font-size: 26px;
  font-weight: bold;
  padding: 10px;
  border: 2px solid #000;
  border-radius: 8px;
  background-color: #f5f5f5;
  margin-bottom: 15px;
}


</style>

</head>

<body>

<h2>工事部機器管理フォーム</h2>

<p id="itemDisplay"></p>  <!-- 👈追加 -->

<form id="form">

<input type="hidden" id="item">

<label>区分</label>
<select id="mode" required>
  <option value="">選択してください</option>
  <option value="持出">持出</option>
  <option value="返却">返却</option>
</select>

<!-- 持出 -->
<div id="carryFields" style="display:none;">

  <label>現場名（持出）</label>
  <input type="text" id="siteCarry">

  <label>担当者（持出）</label>
  <input type="text" id="userCarry">

  <label>持出日</label>
  <input type="date" id="carryDate">

  <label>返却予定日</label>
  <input type="date" id="returnPlan">

</div>

<!-- 返却 -->
<div id="returnFields" style="display:none;">

  <label>現場名（返却）</label>
  <input type="text" id="siteReturn">

  <label>担当者（返却）</label>
  <input type="text" id="userReturn">

  <label>返却日</label>
  <input type="date" id="returnDate">

  <label>故障・不具合の有無</label>
  <select id="issueFlag">
    <option value="なし">なし</option>
    <option value="あり">あり</option>
  </select>

  <div id="issueDetailArea" style="display:none;">
    <label>故障・不具合の詳細な内容</label>
    <textarea id="issueDetail"></textarea>
  </div>

</div>

<button type="submit">送信</button>

</form>

"SH-1": { name: "シュミットハンマー", category: "E" },
"SH-2": { name: "シュミットハンマー", category: "E" },
"SH-3": { name: "シュミットハンマー", category: "E" },
"DM": { name: "電磁式膜厚計", category: "E" },
"SU-1": { name: "水位計", category: "E" },
"SO-1": { name: "騒音計", category: "E" },
"D-1": { name: "濁度計", category: "E" },
"D-2": { name: "濁度計", category: "E" },

};


// QRから備品ID取得
const params = new URLSearchParams(window.location.search);
const item = params.get("item")?.trim();

let info = {};

// ✅ QRチェック
if (!item || !item.match(/^[A-Za-z0-9]{1,2}(No\.|-)\d{1,2}$/)) {

  document.getElementById("itemDisplay").innerText =
    "⚠ 不正なQRコードです";

  document.getElementById("form").style.display = "none";

} else {

  document.getElementById("item").value = item;

  info = itemMaster[item] || {};

  const name = info.name || "不明機器";

  document.getElementById("itemDisplay").innerText =
    "対象機器：" + name + "　" + item;
}



// 区分切替
document.getElementById("mode").addEventListener("change", function () {
  const mode = this.value;

  document.getElementById("carryFields").style.display =
    (mode === "持出") ? "block" : "none";

  document.getElementById("returnFields").style.display =
    (mode === "返却") ? "block" : "none";
});


// 不具合詳細
document.getElementById("issueFlag").addEventListener("change", function () {
  document.getElementById("issueDetailArea").style.display =
    (this.value === "あり") ? "block" : "none";
});


// ✅ 未入力チェック＋送信
document.getElementById("form").addEventListener("submit", async function (e) {
  e.preventDefault();

  // ✅ ここに追加（送信直後に表示）
  document.getElementById("loading").style.display = "block";

  const mode = document.getElementById("mode").value;


  if (!mode) {
    document.getElementById("loading").style.display = "none"; 
    alert("区分を選択してください");
    return;
  }

  if (mode === "持出") {

    if (!document.getElementById("siteCarry").value ||
        !document.getElementById("userCarry").value ||
        !document.getElementById("carryDate").value ||
        !document.getElementById("returnPlan").value) {
      document.getElementById("loading").style.display = "none";
      alert("持出の必須項目を入力してください");
      return;
    }

  } else {

    if (!document.getElementById("siteReturn").value ||
        !document.getElementById("userReturn").value ||
        !document.getElementById("returnDate").value) {
      document.getElementById("loading").style.display = "none";
      alert("返却の必須項目を入力してください");
      return;
    }

    if (document.getElementById("issueFlag").value === "あり" &&
        !document.getElementById("issueDetail").value) {
      document.getElementById("loading").style.display = "none";
      alert("不具合内容を入力してください");
      return;
    }
  }


// ✅ 状態判定
try {

  const checkResponse = await fetch("https://default0f53725a8c9b48c08dc9f6ef78645c.2a.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/1f5e4045f22d4f8aaf1e797433e35167/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=R9iss2F6xwWbBOO2Nyi7HckyVx65IERg2iZnl1FMvAY", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      item: item,
      category: info.category
    })
  });

  const result = await checkResponse.json();
  const currentStatus = result.status;

  if (mode === "持出") {

    const normalStates = ["在庫有", "持出中"];

    // ✅ undefined → エラー（ここだけは止める）
    if (currentStatus === undefined) {
      alert("状態の取得に失敗しました。管理者に連絡してください。");
      return;
    }

    // ✅ 正常以外のみ確認（空欄はここで自然にスルーされる）
    if (currentStatus && !normalStates.includes(currentStatus)) {

      const ok = confirm(
        `この機器の現在の状態は「${currentStatus}」になっています。\nこのまま持ち出しますか？`
      );

      if (!ok) {
        document.getElementById("loading").style.display = "none";
        return;
      }

    }
  }

} catch (error) {
  document.getElementById("loading").style.display = "none";
  alert("状態確認に失敗しました");
  return;
}


  // ✅ 送信データ（ここが強化された）
  const data = {
    item: item,
    name: info.name || "",
    category: info.category || "",
    mode: mode,

    siteCarry: document.getElementById("siteCarry").value,
    userCarry: document.getElementById("userCarry").value,
    carryDate: document.getElementById("carryDate").value,
    returnPlan: document.getElementById("returnPlan").value,

    siteReturn: document.getElementById("siteReturn").value,
    userReturn: document.getElementById("userReturn").value,
    returnDate: document.getElementById("returnDate").value,
    issueFlag: document.getElementById("issueFlag").value,
    issueDetail: document.getElementById("issueDetail").value
  };

  fetch("https://default0f53725a8c9b48c08dc9f6ef78645c.2a.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/30f74b7d2c864da6867c13ed6eeba819/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=sY5BhwgVdQCHYMZ-EDowMEeTHPY64S6Efg79Q7sEE4I", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  })


  .then(response => {
    document.getElementById("loading").style.display = "none";
    if (response.ok) {
      alert("送信成功");
    } else {
      alert("エラー：" + response.status);
    }
  })
  .catch(error => {
    alert("通信エラー：" + error);
  });
});

</script>

  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background-color:rgba(0,0,0,0.5);
  z-index:9999;
">

  <div style="
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    text-align:center;
    color:white;
  ">

    <!-- ✅ くるくる部分 -->
    <div class="spinner"></div>

    <div style="margin-top:20px; font-size:24px;">
      処理中です...
    </div>

  </div>

</div>
</body>
</html>
